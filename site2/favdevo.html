<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
              <img src="icenter.png" alt="icenter">

      <div class="header-image">
      
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table class="devo">
          <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
          </tr>
          <tr>
              <td>Neihlee Muir</td>
              <td>I Will Prepare the Way Before You</td>
              <td>I-Center</td>
              <td>2026</td>
          </tr>
          <tr>
            <td>Elder Bruce C. & Sister Marie Hafen</td>
            <td>"Severe Mercy"-Love and Sacrifice</td>
            <td>I-Center</td>
            <td> 2026</td>
          </tr>
          <tr> 
            <td>Jennifer Platt</td>
            <td>Washing Their Nets</td>
            <td>I-Center</td>
            <td>2026</td>
          </tr>

          <form class="devo-form">
            <h2>Add a New Devtional</h2>

            <label for="speaker">Speaker</label>
            <input type="text" id="speaker" name="speaker" placeholder="Enter devtional name">

            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Enter devtional title">
            
            <label for="year">Year</label>
            <input type="number" id="year" name="year" placeholder="Enter Year">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Enter location">

            <button type="submit">Add Devtional</button>

            
          </form>

        </table>
         
      </div>
    </main>
  </div>
</body>
</html>
